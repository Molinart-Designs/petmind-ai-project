<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1600" height="980" viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #4b5563; }
      .group { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; ry: 18; }
      .actor { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; rx: 16; ry: 16; }
      .api { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 16; ry: 16; }
      .service { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 16; ry: 16; }
      .data { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 16; ry: 16; }
      .ext { fill: #fdf2f8; stroke: #db2777; stroke-width: 2; rx: 16; ry: 16; }
      .obs { fill: #fefce8; stroke: #ca8a04; stroke-width: 2; rx: 16; ry: 16; }
      .label { font: 700 20px Arial, sans-serif; fill: #111827; }
      .small { font: 400 14px Arial, sans-serif; fill: #374151; }
      .group-title { font: 700 18px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 8 6; }
      .note { font: 400 13px Arial, sans-serif; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#ffffff"/>

  <text x="800" y="45" text-anchor="middle" class="title">PetMind AI — Diagrama C4 de Arquitectura (Contexto + Contenedores)</text>
  <text x="800" y="72" text-anchor="middle" class="subtitle">Backend AI/LLM para recomendaciones personalizadas de cuidado de mascotas usando FastAPI, RAG, OpenAI y AWS</text>

  <!-- Actores -->
  <rect x="60" y="150" width="250" height="120" class="actor"/>
  <text x="185" y="187" text-anchor="middle" class="label">Dueño de Mascota / Cliente API</text>
  <text x="185" y="214" text-anchor="middle" class="small">Envía consultas en lenguaje natural</text>
  <text x="185" y="235" text-anchor="middle" class="small">Consume respuestas y fuentes</text>

  <rect x="60" y="350" width="250" height="120" class="actor"/>
  <text x="185" y="387" text-anchor="middle" class="label">Curador de Contenido / Admin</text>
  <text x="185" y="414" text-anchor="middle" class="small">Carga documentos curados</text>
  <text x="185" y="435" text-anchor="middle" class="small">Mantiene la base de conocimiento</text>

  <!-- AWS group -->
  <rect x="360" y="110" width="1180" height="780" class="group"/>
  <text x="390" y="145" class="group-title">Entorno Cloud en AWS</text>

  <!-- API/Security group -->
  <rect x="410" y="180" width="310" height="250" class="group"/>
  <text x="435" y="212" class="group-title">Capa API</text>

  <rect x="450" y="235" width="230" height="85" class="api"/>
  <text x="565" y="267" text-anchor="middle" class="label">Backend FastAPI</text>
  <text x="565" y="292" text-anchor="middle" class="small">/query, /ingest, /health</text>

  <rect x="450" y="335" width="230" height="70" class="api"/>
  <text x="565" y="363" text-anchor="middle" class="label">Auth + Rate Limiting</text>
  <text x="565" y="384" text-anchor="middle" class="small">API Key / JWT (futuro)</text>

  <!-- Orchestration group -->
  <rect x="760" y="180" width="340" height="330" class="group"/>
  <text x="785" y="212" class="group-title">Capa AI / Orquestación</text>

  <rect x="805" y="235" width="250" height="78" class="service"/>
  <text x="930" y="266" text-anchor="middle" class="label">Orquestador RAG</text>
  <text x="930" y="290" text-anchor="middle" class="small">LangChain / LlamaIndex</text>

  <rect x="805" y="325" width="250" height="78" class="service"/>
  <text x="930" y="356" text-anchor="middle" class="label">Retriever</text>
  <text x="930" y="380" text-anchor="middle" class="small">búsqueda top-k + filtros</text>

  <rect x="805" y="415" width="250" height="70" class="service"/>
  <text x="930" y="444" text-anchor="middle" class="label">Constructor de Prompt</text>
  <text x="930" y="465" text-anchor="middle" class="small">system prompt + perfil mascota</text>

  <!-- Data group -->
  <rect x="1140" y="180" width="350" height="420" class="group"/>
  <text x="1165" y="212" class="group-title">Capa de Datos</text>

  <rect x="1185" y="235" width="260" height="85" class="data"/>
  <text x="1315" y="267" text-anchor="middle" class="label">Vector Store</text>
  <text x="1315" y="292" text-anchor="middle" class="small">pgvector / ChromaDB</text>

  <rect x="1185" y="338" width="260" height="85" class="data"/>
  <text x="1315" y="370" text-anchor="middle" class="label">PostgreSQL</text>
  <text x="1315" y="395" text-anchor="middle" class="small">sesiones, metadatos, documentos</text>

  <rect x="1185" y="441" width="260" height="85" class="data"/>
  <text x="1315" y="473" text-anchor="middle" class="label">Documentos de Conocimiento</text>
  <text x="1315" y="498" text-anchor="middle" class="small">corpus curado sobre mascotas</text>

  <!-- External -->
  <rect x="760" y="560" width="340" height="150" class="group"/>
  <text x="785" y="592" class="group-title">Servicio Externo de IA</text>

  <rect x="805" y="615" width="250" height="72" class="ext"/>
  <text x="930" y="646" text-anchor="middle" class="label">API de OpenAI</text>
  <text x="930" y="670" text-anchor="middle" class="small">generación LLM + embeddings</text>

  <!-- Observability -->
  <rect x="1140" y="630" width="350" height="170" class="group"/>
  <text x="1165" y="662" class="group-title">Observabilidad</text>

  <rect x="1185" y="690" width="260" height="72" class="obs"/>
  <text x="1315" y="721" text-anchor="middle" class="label">Logs Estructurados + Métricas</text>
  <text x="1315" y="745" text-anchor="middle" class="small">CloudWatch (objetivo) / logs locales</text>

  <!-- Arrows -->
  <path d="M 310 210 C 360 210, 390 265, 450 265" class="arrow"/>
  <path d="M 310 410 C 360 410, 390 280, 450 280" class="arrow"/>

  <path d="M 565 320 L 565 335" class="arrow"/>
  <path d="M 680 278 C 720 278, 745 274, 805 274" class="arrow"/>
  <path d="M 680 278 C 720 278, 742 364, 805 364" class="arrow"/>
  <path d="M 680 278 C 720 278, 742 450, 805 450" class="arrow"/>

  <path d="M 1055 364 C 1100 364, 1125 278, 1185 278" class="arrow"/>
  <path d="M 1055 364 C 1100 364, 1125 381, 1185 381" class="arrow"/>
  <path d="M 1315 441 L 1315 423" class="arrow dashed"/>
  <path d="M 1315 338 L 1315 320" class="arrow dashed"/>

  <path d="M 930 485 L 930 615" class="arrow"/>
  <path d="M 1185 725 C 1080 725, 1040 520, 930 520 C 820 520, 760 520, 680 300" class="arrow dashed"/>

  <!-- Legend -->
  <rect x="60" y="760" width="1480" height="150" class="group"/>
  <text x="90" y="795" class="group-title">Notas</text>
  <text x="90" y="825" class="note">• La app móvil queda fuera del alcance evaluable del curso; este backend es el núcleo AI/LLM que consumirá la app.</text>
  <text x="90" y="850" class="note">• Flujo de consulta: Cliente → FastAPI → Retriever / Constructor de Prompt → OpenAI → Respuesta con fuentes.</text>
  <text x="90" y="875" class="note">• Flujo de ingesta: Curador → FastAPI /ingest → chunking + embeddings → vector store + persistencia de metadatos.</text>
</svg>
