<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1700" height="1180" viewBox="0 0 1700 1180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #4b5563; }
      .group { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; ry: 18; }
      .step-api { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 16; ry: 16; }
      .step-ai { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 16; ry: 16; }
      .step-data { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 16; ry: 16; }
      .step-ext { fill: #fdf2f8; stroke: #db2777; stroke-width: 2; rx: 16; ry: 16; }
      .step-ops { fill: #fefce8; stroke: #ca8a04; stroke-width: 2; rx: 16; ry: 16; }
      .label { font: 700 20px Arial, sans-serif; fill: #111827; }
      .small { font: 400 14px Arial, sans-serif; fill: #374151; }
      .group-title { font: 700 18px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 8 6; }
      .note { font: 400 13px Arial, sans-serif; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1700" height="1180" fill="#ffffff"/>

  <text x="850" y="45" text-anchor="middle" class="title">PetMind AI — Diagrama de Flujo de Datos / Secuencia</text>
  <text x="850" y="72" text-anchor="middle" class="subtitle">Flujos principales de consulta, ingesta y health check para la API AI/LLM</text>

  <!-- Query flow group -->
  <rect x="40" y="110" width="1620" height="430" class="group"/>
  <text x="70" y="145" class="group-title">Flujo principal: /api/v1/query</text>

  <rect x="70" y="185" width="190" height="90" class="step-api"/>
  <text x="165" y="220" text-anchor="middle" class="label">1. Cliente</text>
  <text x="165" y="245" text-anchor="middle" class="small">envía pregunta + perfil</text>

  <rect x="300" y="185" width="210" height="90" class="step-api"/>
  <text x="405" y="218" text-anchor="middle" class="label">2. FastAPI</text>
  <text x="405" y="242" text-anchor="middle" class="small">auth, validación, rate limit</text>
  <text x="405" y="262" text-anchor="middle" class="small">trace_id</text>

  <rect x="550" y="185" width="220" height="90" class="step-ai"/>
  <text x="660" y="218" text-anchor="middle" class="label">3. Orquestador RAG</text>
  <text x="660" y="242" text-anchor="middle" class="small">normaliza consulta</text>
  <text x="660" y="262" text-anchor="middle" class="small">extrae filtros/contexto</text>

  <rect x="810" y="185" width="220" height="90" class="step-ai"/>
  <text x="920" y="218" text-anchor="middle" class="label">4. Retriever</text>
  <text x="920" y="242" text-anchor="middle" class="small">top-k + filtros por metadata</text>
  <text x="920" y="262" text-anchor="middle" class="small">species / category / stage</text>

  <rect x="1070" y="185" width="220" height="90" class="step-data"/>
  <text x="1180" y="218" text-anchor="middle" class="label">5. Vector Store</text>
  <text x="1180" y="242" text-anchor="middle" class="small">chunks + embeddings</text>
  <text x="1180" y="262" text-anchor="middle" class="small">similitud semántica</text>

  <rect x="810" y="330" width="220" height="90" class="step-ai"/>
  <text x="920" y="363" text-anchor="middle" class="label">6. Constructor de Prompt</text>
  <text x="920" y="387" text-anchor="middle" class="small">system prompt + chunks</text>
  <text x="920" y="407" text-anchor="middle" class="small">+ perfil de mascota</text>

  <rect x="1070" y="330" width="220" height="90" class="step-ext"/>
  <text x="1180" y="363" text-anchor="middle" class="label">7. API de OpenAI</text>
  <text x="1180" y="387" text-anchor="middle" class="small">genera respuesta</text>
  <text x="1180" y="407" text-anchor="middle" class="small">usa contexto recuperado</text>

  <rect x="1330" y="330" width="210" height="90" class="step-ai"/>
  <text x="1435" y="363" text-anchor="middle" class="label">8. Post-procesamiento</text>
  <text x="1435" y="387" text-anchor="middle" class="small">validación de salida</text>
  <text x="1435" y="407" text-anchor="middle" class="small">fuentes + formato final</text>

  <rect x="1330" y="185" width="210" height="90" class="step-ops"/>
  <text x="1435" y="218" text-anchor="middle" class="label">9. Logs y métricas</text>
  <text x="1435" y="242" text-anchor="middle" class="small">latencia, tokens, errores</text>
  <text x="1435" y="262" text-anchor="middle" class="small">retrieval_ms, llm_ms</text>

  <rect x="70" y="330" width="190" height="90" class="step-api"/>
  <text x="165" y="363" text-anchor="middle" class="label">10. Respuesta API</text>
  <text x="165" y="387" text-anchor="middle" class="small">response + sources</text>
  <text x="165" y="407" text-anchor="middle" class="small">tokens + latency</text>

  <!-- arrows query -->
  <path d="M 260 230 L 300 230" class="arrow"/>
  <path d="M 510 230 L 550 230" class="arrow"/>
  <path d="M 770 230 L 810 230" class="arrow"/>
  <path d="M 1030 230 L 1070 230" class="arrow"/>
  <path d="M 920 275 L 920 330" class="arrow"/>
  <path d="M 1030 375 L 1070 375" class="arrow"/>
  <path d="M 1290 375 L 1330 375" class="arrow"/>
  <path d="M 1435 330 L 1435 275" class="arrow dashed"/>
  <path d="M 1330 375 C 1220 470, 400 470, 260 375" class="arrow"/>
  <path d="M 1435 275 C 1435 300, 1450 300, 1450 300" class="arrow dashed"/>

  <!-- Ingest flow group -->
  <rect x="40" y="575" width="1620" height="275" class="group"/>
  <text x="70" y="610" class="group-title">Flujo de ingesta: /api/v1/ingest</text>

  <rect x="70" y="650" width="200" height="90" class="step-api"/>
  <text x="170" y="683" text-anchor="middle" class="label">1. Curador / Admin</text>
  <text x="170" y="707" text-anchor="middle" class="small">envía documentos</text>
  <text x="170" y="727" text-anchor="middle" class="small">texto, metadata, categoría</text>

  <rect x="310" y="650" width="220" height="90" class="step-api"/>
  <text x="420" y="683" text-anchor="middle" class="label">2. FastAPI /ingest</text>
  <text x="420" y="707" text-anchor="middle" class="small">valida payload</text>
  <text x="420" y="727" text-anchor="middle" class="small">normaliza entrada</text>

  <rect x="570" y="650" width="220" height="90" class="step-ai"/>
  <text x="680" y="683" text-anchor="middle" class="label">3. Chunking</text>
  <text x="680" y="707" text-anchor="middle" class="small">divide documentos</text>
  <text x="680" y="727" text-anchor="middle" class="small">con overlap</text>

  <rect x="830" y="650" width="220" height="90" class="step-ext"/>
  <text x="940" y="683" text-anchor="middle" class="label">4. Embeddings</text>
  <text x="940" y="707" text-anchor="middle" class="small">genera vectores</text>
  <text x="940" y="727" text-anchor="middle" class="small">para cada chunk</text>

  <rect x="1090" y="650" width="220" height="90" class="step-data"/>
  <text x="1200" y="683" text-anchor="middle" class="label">5. Vector Store</text>
  <text x="1200" y="707" text-anchor="middle" class="small">guarda chunks + embeddings</text>
  <text x="1200" y="727" text-anchor="middle" class="small">índice semántico</text>

  <rect x="1350" y="650" width="220" height="90" class="step-data"/>
  <text x="1460" y="683" text-anchor="middle" class="label">6. PostgreSQL</text>
  <text x="1460" y="707" text-anchor="middle" class="small">metadatos, fuente, estado</text>
  <text x="1460" y="727" text-anchor="middle" class="small">persistencia operativa</text>

  <path d="M 270 695 L 310 695" class="arrow"/>
  <path d="M 530 695 L 570 695" class="arrow"/>
  <path d="M 790 695 L 830 695" class="arrow"/>
  <path d="M 1050 695 L 1090 695" class="arrow"/>
  <path d="M 1310 695 L 1350 695" class="arrow"/>

  <!-- Health flow group -->
  <rect x="40" y="885" width="1620" height="185" class="group"/>
  <text x="70" y="920" class="group-title">Flujo de monitoreo: /api/v1/health</text>

  <rect x="70" y="955" width="220" height="80" class="step-api"/>
  <text x="180" y="988" text-anchor="middle" class="label">1. Cliente / Monitor</text>
  <text x="180" y="1012" text-anchor="middle" class="small">solicita health check</text>

  <rect x="330" y="955" width="230" height="80" class="step-api"/>
  <text x="445" y="988" text-anchor="middle" class="label">2. FastAPI /health</text>
  <text x="445" y="1012" text-anchor="middle" class="small">coordina verificaciones</text>

  <rect x="600" y="955" width="220" height="80" class="step-ext"/>
  <text x="710" y="988" text-anchor="middle" class="label">3. Verifica OpenAI</text>
  <text x="710" y="1012" text-anchor="middle" class="small">disponibilidad / timeout</text>

  <rect x="860" y="955" width="220" height="80" class="step-data"/>
  <text x="970" y="988" text-anchor="middle" class="label">4. Verifica Vector Store</text>
  <text x="970" y="1012" text-anchor="middle" class="small">lectura mínima</text>

  <rect x="1120" y="955" width="220" height="80" class="step-data"/>
  <text x="1230" y="988" text-anchor="middle" class="label">5. Verifica PostgreSQL</text>
  <text x="1230" y="1012" text-anchor="middle" class="small">conexión y consulta simple</text>

  <rect x="1380" y="955" width="190" height="80" class="step-ops"/>
  <text x="1475" y="988" text-anchor="middle" class="label">6. Estado final</text>
  <text x="1475" y="1012" text-anchor="middle" class="small">healthy / degraded</text>

  <path d="M 290 995 L 330 995" class="arrow"/>
  <path d="M 560 995 L 600 995" class="arrow"/>
  <path d="M 820 995 L 860 995" class="arrow"/>
  <path d="M 1080 995 L 1120 995" class="arrow"/>
  <path d="M 1340 995 L 1380 995" class="arrow"/>

  <!-- Notes -->
  <rect x="1170" y="80" width="460" height="70" class="group"/>
  <text x="1195" y="108" class="group-title">Resultado esperado de /query</text>
  <text x="1195" y="130" class="note">response + sources + tokens_used + latency_ms + session_id</text>
</svg>
